name: Run E2E Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master
jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://root:123@localhost:5432/api-solid-db?schema=public
      JWT_SECRET: 123456
      JWT_ACCESS_TOKEN_EXPIRES_IN: 86400
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_BUCKET_NAME: fast-feet-test
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      MAIL_HOST: smtp.ethereal.email
      MAIL_PORT: 587
      MAIL_USER: isobel.hagenes@ethereal.email
      MAIL_PASS: YfV3Y7TJtTH87zDmgQ
      MAIL_FROM: isobel.hagenes@ethereal.email

    services:
      db:
        image: postgres:latest
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: api-solid-db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
      - name: Run E2E tests
        run: npm run test:e2e
