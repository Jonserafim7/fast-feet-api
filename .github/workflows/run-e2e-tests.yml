name: Run E2E Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master
jobs:
  run-e2e-tests:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://root:123@localhost:5432/api-solid-db?schema=public
      JWT_SECRET: 123456
      JWT_ACCESS_TOKEN_EXPIRES_IN: 86400
      AWS_ACCESS_KEY_ID: test-access-key-id
      AWS_SECRET_ACCESS_KEY: test-secret-access-key
      AWS_BUCKET_NAME: test-bucket
      CLOUDFLARE_ACCOUNT_ID: test-cloudflare-account-id
      MAIL_HOST: smtp.test.com
      MAIL_PORT: 587
      MAIL_USER: test@test.com
      MAIL_PASS: test-password
      MAIL_FROM: noreply@test.com

    services:
      db:
        image: postgres:latest
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: api-solid-db
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
      - name: Run E2E tests
        run: npm run test:e2e
